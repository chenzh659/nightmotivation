<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日夜间动力</title>
  <style>
    :root {
      color-scheme: dark;
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, 0.72);
      --soft: rgba(248, 251, 255, 0.48);
      --line: rgba(255, 255, 255, 0.18);
      --glass: rgba(10, 18, 32, 0.42);
      --warm: #ffd89a;
      --mint: #a9f3d0;
      --blue: #97c9ff;
      --shadow: rgba(0, 0, 0, 0.38);
      --active-bg: url("assets/night-landscape-bg.png");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center start;
      overflow: hidden;
      padding: clamp(1.25rem, 4vw, 4rem);
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #07111f;
    }

    body.is-immersive {
      place-items: center start;
    }

    .wallpaper {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      pointer-events: none;
      background-image:
        linear-gradient(90deg, rgba(4, 8, 18, 0.62), rgba(4, 8, 18, 0.28) 46%, rgba(4, 8, 18, 0.12)),
        linear-gradient(180deg, rgba(5, 10, 22, 0.08), rgba(3, 8, 17, 0.72)),
        var(--active-bg);
      background-position: center;
      background-size: cover;
      transform: scale(1.02);
      animation: wallpaperFloat 28s ease-in-out infinite alternate;
    }

    .wallpaper::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        conic-gradient(from 204deg at 52% 37%,
          transparent 0 19%,
          rgba(127, 214, 255, 0.16) 24%,
          rgba(171, 244, 200, 0.14) 31%,
          transparent 40% 100%),
        conic-gradient(from 42deg at 42% 32%,
          transparent 0 61%,
          rgba(255, 217, 151, 0.15) 67%,
          rgba(151, 201, 255, 0.12) 74%,
          transparent 82% 100%);
      filter: blur(34px) saturate(125%);
      opacity: 0.9;
      transform: rotate(-4deg);
      animation: breathe 16s ease-in-out infinite alternate;
    }

    .moon {
      position: absolute;
      top: clamp(4rem, 9vh, 6.5rem);
      right: clamp(2rem, 10vw, 9rem);
      width: clamp(4.8rem, 8vw, 7.2rem);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 30%, #fff7dc 0 13%, #ffe2a7 42%, #c99055 100%);
      box-shadow:
        0 0 2.4rem rgba(255, 226, 167, 0.42),
        0 0 8rem rgba(255, 226, 167, 0.24);
    }

    .moon,
    .landscape,
    .water {
      display: none;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: 0;
      content: "";
      background-repeat: repeat;
      opacity: 0.62;
      animation: drift 42s linear infinite;
    }

    .stars {
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.92) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(151, 201, 255, 0.82) 0 1px, transparent 1.9px);
      background-size: 8rem 8rem, 13rem 13rem;
      background-position: 0 0, 3rem 4rem;
    }

    .stars::before {
      background-image: radial-gradient(circle, rgba(255, 216, 154, 0.86) 0 1px, transparent 1.8px);
      background-size: 17rem 17rem;
      background-position: 4rem 2rem;
      opacity: 0.42;
      animation-duration: 58s;
    }

    .stars::after {
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.74) 0 0.8px, transparent 1.5px);
      background-size: 5.5rem 5.5rem;
      background-position: 2rem 3rem;
      opacity: 0.24;
      animation-direction: reverse;
    }

    .landscape {
      position: absolute;
      inset: auto -8vw -1px;
      height: 48vh;
      background:
        radial-gradient(80% 72% at 16% 99%, #102537 0 52%, transparent 53%),
        radial-gradient(76% 78% at 55% 105%, #19384a 0 55%, transparent 56%),
        radial-gradient(70% 86% at 92% 102%, #0a1d2d 0 58%, transparent 59%),
        linear-gradient(180deg, transparent 6%, #06101d 72%);
      filter: drop-shadow(0 -1.5rem 4rem rgba(151, 201, 255, 0.1));
      opacity: 0.98;
    }

    .water {
      position: absolute;
      left: -10vw;
      right: -10vw;
      bottom: -13vh;
      height: 35vh;
      background:
        radial-gradient(68% 96% at 55% 0%, rgba(255, 216, 154, 0.22), transparent 58%),
        repeating-linear-gradient(180deg,
          rgba(248, 251, 255, 0.15) 0 1px,
          transparent 1px 19px),
        linear-gradient(180deg, rgba(27, 71, 82, 0.76), rgba(3, 11, 20, 0.98));
      clip-path: ellipse(58% 54% at 50% 42%);
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.16;
      mix-blend-mode: soft-light;
      background-image:
        linear-gradient(115deg, rgba(255, 255, 255, 0.05), transparent 36%),
        repeating-radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 4px);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(43rem, 100%);
      min-height: auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(1.1rem, 2.6vw, 1.8rem);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 1.5rem;
      background:
        radial-gradient(120% 120% at 0% 0%, rgba(255, 255, 255, 0.11), transparent 46%),
        linear-gradient(145deg, rgba(7, 13, 25, 0.48), rgba(7, 13, 25, 0.18));
      box-shadow:
        0 1.6rem 5rem rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(14px) saturate(118%);
      transition:
        width 240ms ease,
        background 240ms ease,
        border-color 240ms ease,
        box-shadow 240ms ease,
        backdrop-filter 240ms ease;
    }

    body.is-immersive .shell {
      width: min(46rem, 100%);
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    body.is-immersive .topbar,
    body.is-immersive .actions,
    body.is-immersive .favorites-panel {
      display: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .mark {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--warm), var(--mint), var(--blue));
      box-shadow: 0 0 1.2rem rgba(169, 243, 208, 0.46);
    }

    .date {
      margin: 0;
      padding: 0.48rem 0.72rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: rgba(248, 251, 255, 0.66);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      font-size: 0.82rem;
      line-height: 1;
      text-align: right;
      white-space: nowrap;
    }

    .content {
      display: grid;
      align-content: center;
      padding: clamp(2rem, 5vw, 4.2rem) 0 clamp(2.2rem, 5vw, 4.5rem);
    }

    .eyebrow,
    h1,
    .message {
      text-shadow: 0 0.35rem 1.8rem rgba(0, 0, 0, 0.32);
    }

    .content.is-changing .eyebrow,
    .content.is-changing h1,
    .content.is-changing .message {
      animation: quoteIn 520ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .content.is-changing h1 {
      animation-delay: 55ms;
    }

    .content.is-changing .message {
      animation-delay: 115ms;
    }

    .eyebrow {
      margin: 0 0 1.05rem;
      color: var(--warm);
      font-size: clamp(0.86rem, 1.6vw, 1rem);
      font-weight: 650;
    }

    h1 {
      max-width: 11.5ch;
      margin: 0;
      font-size: clamp(2.55rem, 5.7vw, 4.7rem);
      font-weight: 720;
      line-height: 1.03;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .message {
      max-width: 36rem;
      margin: clamp(1.35rem, 3vw, 2rem) 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.36rem);
      line-height: 1.85;
    }

    .actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "hint tools"
        "bgs tools";
      gap: 0.78rem 1rem;
      align-items: end;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--soft);
      font-size: 0.95rem;
    }

    .hint {
      grid-area: hint;
      min-width: 0;
      max-width: 18rem;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .controls {
      display: contents;
    }

    .backgrounds {
      grid-area: bgs;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .tool-buttons {
      grid-area: tools;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: flex-end;
      align-self: center;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      min-width: 2.75rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      font: inherit;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .bg-choice {
      width: 2.35rem;
      height: 2.35rem;
      min-width: 2.35rem;
      min-height: 2.35rem;
      padding: 0;
      border-radius: 999px;
      color: transparent;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.16)),
        var(--thumb),
        linear-gradient(135deg, var(--swatch-a), var(--swatch-b));
      background-position: center;
      background-size: cover;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.16),
        0 0.45rem 1.4rem rgba(0, 0, 0, 0.18);
    }

    .bg-choice[aria-pressed="true"] {
      border-color: rgba(255, 255, 255, 0.78);
      box-shadow:
        0 0 0 3px rgba(151, 201, 255, 0.28),
        inset 0 0 0 1px rgba(255, 255, 255, 0.32);
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.32);
    }

    button:focus-visible {
      outline: 3px solid rgba(151, 201, 255, 0.75);
      outline-offset: 4px;
    }

    .primary {
      gap: 0.55rem;
      min-width: 6.5rem;
      padding: 0 1.05rem 0 0.9rem;
      color: #06101f;
      background: linear-gradient(135deg, #fff0c9, #a9f3d0 46%, #97c9ff);
      border-color: rgba(255, 255, 255, 0.42);
      font-weight: 720;
      white-space: nowrap;
    }

    .primary:hover {
      background: linear-gradient(135deg, #fff5dc, #bdf8de 48%, #acd4ff);
    }

    .icon {
      width: 1.15rem;
      height: 1.15rem;
      flex: 0 0 auto;
    }

    .icon-button[aria-pressed="true"] {
      color: #06101f;
      background: linear-gradient(135deg, #ffe4a8, #a9f3d0);
      border-color: rgba(255, 255, 255, 0.44);
    }

    .favorites-panel {
      position: absolute;
      right: clamp(1rem, 2vw, 1.5rem);
      bottom: 5.6rem;
      width: min(25rem, calc(100% - 2rem));
      max-height: min(24rem, 54vh);
      overflow: auto;
      padding: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 1.15rem;
      background: rgba(7, 13, 25, 0.72);
      box-shadow: 0 1.6rem 4rem rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(22px) saturate(122%);
    }

    .favorites-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .favorites-list {
      display: grid;
      gap: 0.7rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .favorite-card {
      padding: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.9rem;
      background: rgba(255, 255, 255, 0.07);
    }

    .favorite-card strong {
      display: block;
      margin-bottom: 0.25rem;
      color: var(--text);
      font-size: 0.95rem;
    }

    .favorite-card span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .empty-state {
      margin: 0;
      color: var(--soft);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    @keyframes drift {
      to {
        transform: translate3d(-3rem, 2rem, 0);
      }
    }

    @keyframes breathe {
      to {
        transform: rotate(-2deg) scale(1.04);
      }
    }

    @keyframes wallpaperFloat {
      to {
        transform: scale(1.06) translate3d(-0.8rem, -0.5rem, 0);
      }
    }

    @keyframes quoteIn {
      from {
        opacity: 0;
        transform: translate3d(0, 0.7rem, 0);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
        filter: blur(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 1rem;
        place-items: end center;
      }

      .shell {
        width: 100%;
        border-radius: 1.2rem;
      }

      .topbar,
      .actions {
        align-items: flex-start;
      }

      .topbar {
        flex-wrap: wrap;
      }

      .date {
        max-width: 10rem;
      }

      .content {
        padding: 3.4rem 0 3rem;
      }

      h1 {
        max-width: 10ch;
      }

      .actions {
        grid-template-columns: 1fr;
        grid-template-areas:
          "hint"
          "bgs"
          "tools";
        align-items: stretch;
      }

      .controls {
        display: contents;
      }

      .primary {
        flex: 0 0 auto;
      }

      .tool-buttons {
        justify-content: flex-start;
        flex-wrap: wrap;
        margin-left: 0;
      }

      .favorites-panel {
        left: 1rem;
        right: 1rem;
        bottom: 6.5rem;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wallpaper" aria-hidden="true">
    <div class="stars"></div>
    <div class="moon"></div>
    <div class="landscape"></div>
    <div class="water"></div>
    <div class="grain"></div>
  </div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="mark"></span>
        <span>Night Focus</span>
      </div>
      <p class="date" id="date"></p>
    </header>

    <section class="content" aria-live="polite">
      <p class="eyebrow" id="eyebrow">今日提醒</p>
      <h1 id="headline"></h1>
      <p class="message" id="message"></p>
    </section>

    <section class="favorites-panel" id="favoritesPanel" hidden>
      <div class="favorites-title">
        <span>收藏的箴言</span>
        <span id="favoriteCount">0</span>
      </div>
      <ul class="favorites-list" id="favoritesList"></ul>
    </section>

    <footer class="actions">
      <span class="hint" id="hint">今日箴言会每天固定，也可以随时换一句。</span>
      <div class="controls">
        <div class="backgrounds" id="backgrounds" aria-label="选择背景"></div>
        <div class="tool-buttons">
          <button class="icon-button" type="button" id="favorite" aria-label="收藏当前箴言" aria-pressed="false" title="收藏">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s-7-4.35-9.4-8.4C.7 9.4 2.5 5.5 6.1 5.1c2-.22 3.55.78 4.45 2.1.9-1.32 2.45-2.32 4.45-2.1 3.6.4 5.4 4.3 3.5 7.5C19 16.65 12 21 12 21Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-button" type="button" id="showFavorites" aria-label="查看收藏" aria-expanded="false" title="查看收藏">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4.5A2.5 2.5 0 0 1 7.5 2h9A2.5 2.5 0 0 1 19 4.5V22l-7-4-7 4V4.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-button" type="button" id="copyQuote" aria-label="复制当前箴言" title="复制">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 8.5A2.5 2.5 0 0 1 10.5 6h7A2.5 2.5 0 0 1 20 8.5v9A2.5 2.5 0 0 1 17.5 20h-7A2.5 2.5 0 0 1 8 17.5v-9Z" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M4 14.5v-8A2.5 2.5 0 0 1 6.5 4h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-button" type="button" id="immersive" aria-label="进入沉浸模式" aria-pressed="false" title="沉浸模式">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="primary" type="button" id="refresh" aria-label="换一句鼓励的话">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 0 1-13.66 5.66M4 12A8 8 0 0 1 17.66 6.34M17 3h1.5A2.5 2.5 0 0 1 21 5.5V7M7 21H5.5A2.5 2.5 0 0 1 3 18.5V17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            换一句
          </button>
        </div>
      </div>
    </footer>
  </main>

  <script>
    const quotes = [
      {
        eyebrow: "清醒",
        headline: "真正的光，先照见自己。",
        message: "一个人开始变强，不是从征服世界开始，而是从不再欺骗自己的那一刻开始。"
      },
      {
        eyebrow: "时间",
        headline: "时间从不喧哗，却回答一切。",
        message: "急切常让人误认方向，沉静却能让答案浮上来。愿你把心放稳，把路看清。"
      },
      {
        eyebrow: "定力",
        headline: "风大时，更要站成山。",
        message: "外界的声音会来来去去，真正属于你的判断，需要在安静中养成，在行动中验证。"
      },
      {
        eyebrow: "当下",
        headline: "能握住今天，便不惧明天。",
        message: "命运很少被一次宏大的决定改变，却常被许多平凡而坚定的选择悄悄改写。"
      },
      {
        eyebrow: "韧性",
        headline: "柔软不是软弱，是更深的力量。",
        message: "能弯下去的人，才不容易折断。能重新开始的人，已经越过了许多看不见的山。"
      },
      {
        eyebrow: "积累",
        headline: "伟大往往藏在重复里。",
        message: "不要轻视那些微小的坚持。水滴没有锋芒，却能在漫长岁月里改变石头的形状。"
      },
      {
        eyebrow: "自由",
        headline: "自律，是把自由还给未来。",
        message: "此刻多一分清醒，往后便少一分被迫。真正的自由，常常来自今天不逃避。"
      },
      {
        eyebrow: "谦逊",
        headline: "看见未知，是智慧的开端。",
        message: "不必急着证明自己全都明白。愿意学习的人，永远比急着正确的人走得更远。"
      },
      {
        eyebrow: "行动",
        headline: "答案偏爱走在路上的人。",
        message: "思考能照亮方向，但行动才会打开道路。先迈出一步，雾中的轮廓才会逐渐显现。"
      },
      {
        eyebrow: "格局",
        headline: "心若宽，路便不窄。",
        message: "许多困住人的不是处境，而是解释处境的方式。换一种目光，世界也会换一种回应。"
      },
      {
        eyebrow: "休息",
        headline: "懂得停下，也是向前的一部分。",
        message: "弓若一直绷紧，便失去力量。让身心归于宁静，明日的你才有重新出发的锋芒。"
      },
      {
        eyebrow: "节奏",
        headline: "走自己的路，不必借别人的钟。",
        message: "万物都有时节。花不因旁人的催促而盛开，人也不必因比较而弄丢自己的秩序。"
      },
      {
        eyebrow: "勇气",
        headline: "勇气不是无惧，是仍然选择。",
        message: "害怕并不羞耻。真正珍贵的是，在不确定里仍愿意负责，在黑暗中仍愿意点灯。"
      },
      {
        eyebrow: "取舍",
        headline: "会舍，才会得其所重。",
        message: "人生的清明，常来自一次次删繁就简。少追逐一点喧闹，便多听见一点内心。"
      },
      {
        eyebrow: "远方",
        headline: "远方不是地点，是方向。",
        message: "只要你仍在靠近那个更好的自己，即使脚步缓慢，也已经走在值得的路上。"
      }
    ];

    const content = document.querySelector(".content");
    const eyebrow = document.querySelector("#eyebrow");
    const headline = document.querySelector("#headline");
    const message = document.querySelector("#message");
    const date = document.querySelector("#date");
    const hint = document.querySelector("#hint");
    const refresh = document.querySelector("#refresh");
    const favorite = document.querySelector("#favorite");
    const showFavorites = document.querySelector("#showFavorites");
    const copyQuote = document.querySelector("#copyQuote");
    const immersive = document.querySelector("#immersive");
    const backgrounds = document.querySelector("#backgrounds");
    const favoritesPanel = document.querySelector("#favoritesPanel");
    const favoritesList = document.querySelector("#favoritesList");
    const favoriteCount = document.querySelector("#favoriteCount");

    const backgroundOptions = [
      {
        id: "lake",
        label: "山湖",
        file: "assets/night-landscape-bg.png",
        swatch: ["#07152d", "#ffd89a"]
      },
      {
        id: "alpine",
        label: "雪山",
        file: "assets/night-bg-alpine.png",
        swatch: ["#0a1730", "#9fd1ff"]
      },
      {
        id: "forest",
        label: "森林",
        file: "assets/night-bg-forest.png",
        swatch: ["#061321", "#4c8a74"]
      },
      {
        id: "desert",
        label: "旷野",
        file: "assets/night-bg-desert.png",
        swatch: ["#140f2a", "#b38b65"]
      },
      {
        id: "coast",
        label: "海岸",
        file: "assets/night-bg-coast.png",
        swatch: ["#061827", "#6fb7c9"]
      },
      {
        id: "aurora",
        label: "极光",
        file: "assets/night-bg-aurora.png",
        swatch: ["#061426", "#70e2aa"]
      }
    ];

    const storageKeys = {
      background: "night-focus-bg",
      favorites: "night-focus-favorites"
    };

    let previousIndex = -1;
    let currentQuoteIndex = -1;
    let hintTimer = 0;

    function getTodayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    }

    function hashText(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
      }
      return hash;
    }

    function getDailyQuoteIndex() {
      return hashText(getTodayKey()) % quotes.length;
    }

    function setHint(text) {
      window.clearTimeout(hintTimer);
      hint.textContent = text;
      hintTimer = window.setTimeout(() => {
        hint.textContent = "今日箴言会每天固定，也可以随时换一句。";
      }, 2200);
    }

    function animateQuote() {
      content.classList.remove("is-changing");
      void content.offsetWidth;
      content.classList.add("is-changing");
    }

    function setQuote(index, shouldAnimate = true) {
      currentQuoteIndex = index;
      previousIndex = index;
      const quote = quotes[index];
      eyebrow.textContent = quote.eyebrow;
      headline.textContent = quote.headline;
      message.textContent = quote.message;
      document.title = `${quote.headline} | 每日夜间动力`;
      updateFavoriteState();

      if (shouldAnimate) {
        animateQuote();
      }
    }

    function pickQuote() {
      let index = Math.floor(Math.random() * quotes.length);
      if (quotes.length > 1) {
        while (index === previousIndex) {
          index = Math.floor(Math.random() * quotes.length);
        }
      }

      setQuote(index);
    }

    function setDate() {
      const weekdayFormatter = new Intl.DateTimeFormat("zh-CN", {
        weekday: "short"
      });
      const formatter = new Intl.DateTimeFormat("zh-CN", {
        month: "long",
        day: "numeric"
      });
      const now = new Date();
      date.textContent = `${formatter.format(now)} ${weekdayFormatter.format(now)}`;
    }

    function setBackground(id) {
      const selected = backgroundOptions.find((option) => option.id === id) || backgroundOptions[0];
      document.documentElement.style.setProperty("--active-bg", `url("${selected.file}")`);
      localStorage.setItem(storageKeys.background, selected.id);

      document.querySelectorAll(".bg-choice").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.bg === selected.id));
      });
    }

    function getActiveBackgroundIndex() {
      const active = localStorage.getItem(storageKeys.background) || backgroundOptions[0].id;
      const index = backgroundOptions.findIndex((option) => option.id === active);
      return index >= 0 ? index : 0;
    }

    function nextBackground() {
      const nextIndex = (getActiveBackgroundIndex() + 1) % backgroundOptions.length;
      setBackground(backgroundOptions[nextIndex].id);
      setHint(`背景已切换为：${backgroundOptions[nextIndex].label}`);
    }

    function renderBackgroundChoices() {
      backgroundOptions.forEach((option) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "bg-choice";
        button.dataset.bg = option.id;
        button.title = option.label;
        button.setAttribute("aria-label", `选择${option.label}背景`);
        button.style.setProperty("--swatch-a", option.swatch[0]);
        button.style.setProperty("--swatch-b", option.swatch[1]);
        button.style.setProperty("--thumb", `url("${option.file}")`);
        button.addEventListener("click", () => setBackground(option.id));
        backgrounds.appendChild(button);
      });
    }

    function loadFavorites() {
      try {
        const value = JSON.parse(localStorage.getItem(storageKeys.favorites) || "[]");
        return Array.isArray(value) ? value.filter(Number.isInteger) : [];
      } catch {
        return [];
      }
    }

    function saveFavorites(favorites) {
      localStorage.setItem(storageKeys.favorites, JSON.stringify([...new Set(favorites)]));
    }

    function isCurrentFavorite() {
      return loadFavorites().includes(currentQuoteIndex);
    }

    function updateFavoriteState() {
      if (!favorite || currentQuoteIndex < 0) {
        return;
      }

      const active = isCurrentFavorite();
      favorite.setAttribute("aria-pressed", String(active));
      favorite.title = active ? "取消收藏" : "收藏";
      favorite.setAttribute("aria-label", active ? "取消收藏当前箴言" : "收藏当前箴言");
    }

    function renderFavorites() {
      const favorites = loadFavorites();
      favoriteCount.textContent = String(favorites.length);
      favoritesList.innerHTML = "";

      if (favorites.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-state";
        empty.textContent = "还没有收藏。遇到愿意反复看的句子，就把它留下。";
        favoritesList.appendChild(empty);
        return;
      }

      favorites.forEach((index) => {
        const quote = quotes[index];
        if (!quote) {
          return;
        }

        const item = document.createElement("li");
        item.className = "favorite-card";
        const title = document.createElement("strong");
        const body = document.createElement("span");
        title.textContent = quote.headline;
        body.textContent = quote.message;
        item.append(title, body);
        item.addEventListener("click", () => {
          setQuote(index);
          favoritesPanel.hidden = true;
          showFavorites.setAttribute("aria-expanded", "false");
        });
        favoritesList.appendChild(item);
      });
    }

    function toggleFavorite() {
      const favorites = loadFavorites();
      const exists = favorites.includes(currentQuoteIndex);
      const next = exists
        ? favorites.filter((index) => index !== currentQuoteIndex)
        : [currentQuoteIndex, ...favorites];

      saveFavorites(next);
      updateFavoriteState();
      renderFavorites();
      setHint(exists ? "已取消收藏。" : "已收藏这句箴言。");
    }

    async function copyCurrentQuote() {
      const quote = quotes[currentQuoteIndex];
      const text = `${quote.headline}\n${quote.message}`;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      setHint("已复制当前箴言。");
    }

    function toggleFavoritesPanel() {
      const willOpen = favoritesPanel.hidden;
      renderFavorites();
      favoritesPanel.hidden = !willOpen;
      showFavorites.setAttribute("aria-expanded", String(willOpen));
    }

    function toggleImmersive() {
      const active = !document.body.classList.contains("is-immersive");
      document.body.classList.toggle("is-immersive", active);
      immersive.setAttribute("aria-pressed", String(active));
      immersive.setAttribute("aria-label", active ? "退出沉浸模式" : "进入沉浸模式");
      immersive.title = active ? "退出沉浸" : "沉浸模式";
    }

    function exitImmersive() {
      document.body.classList.remove("is-immersive");
      immersive.setAttribute("aria-pressed", "false");
      immersive.setAttribute("aria-label", "进入沉浸模式");
      immersive.title = "沉浸模式";
    }

    setDate();
    renderBackgroundChoices();
    setBackground(localStorage.getItem(storageKeys.background) || "lake");
    setQuote(getDailyQuoteIndex(), false);
    renderFavorites();
    refresh.addEventListener("click", pickQuote);
    favorite.addEventListener("click", toggleFavorite);
    showFavorites.addEventListener("click", toggleFavoritesPanel);
    copyQuote.addEventListener("click", copyCurrentQuote);
    immersive.addEventListener("click", toggleImmersive);

    document.addEventListener("keydown", (event) => {
      const tagName = event.target.tagName;
      if (tagName === "INPUT" || tagName === "TEXTAREA" || event.target.isContentEditable) {
        return;
      }

      if (event.code === "Space") {
        event.preventDefault();
        pickQuote();
      }

      if (event.key.toLowerCase() === "b") {
        nextBackground();
      }

      if (event.key.toLowerCase() === "f") {
        toggleImmersive();
      }

      if (event.key === "Escape") {
        exitImmersive();
        favoritesPanel.hidden = true;
        showFavorites.setAttribute("aria-expanded", "false");
      }

      if (event.key.toLowerCase() === "c") {
        copyCurrentQuote();
      }
    });
  </script>
</body>
</html>
